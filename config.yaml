# =============================================================================
# MON.C9.9 — Admin VDI Control Test Configuration
# =============================================================================
# Env var overrides: ILLUMIO_FQDN, ILLUMIO_PORT, ILLUMIO_ORG_ID,
#                    ILLUMIO_API_USER, ILLUMIO_API_KEY
# =============================================================================

pce:
  fqdn: "us-scp14.illum.io"
  port: "443"
  org_id: "3801148"
  # Credentials — use env vars for production
  # api_user: "api_xxxxxxxxx"
  # api_key: "xxxxxxxxxxxxxxxxxxxxxxxxx"

compliance:

  # Restricted ports (as strings for service port matching)
  restricted_ports:
    - "22"      # SSH
    - "23"      # Telnet
    - "3389"    # RDP
    - "7389"    # Secure RDP (DMZ)

  # ----- EXCLUDED SOURCES (non-end-user policy objects) -----
  # Stripped in Step 1 of decision filter chain.

  excluded_sources:   # IP Lists
    - "IPL-ADMIN_VDI"                    # Expected traffic path
    - "IPL-CLUSTER_LINK_LOCAL"           # Link-local between clustered DBs
    - "IPL-MAINFRAME_*"                  # IPL-MAINFRAME_PD, _DV
    - "IPL-GUARDIUM-100028"              # Appliance
    - "IPL-IPT_VOICE_INFRASTRUCTURE_CORE_DATA_CENTER_NETWORKS"
    - "IPL-LOAD_BALANCERS"               # Appliance
    - "IPL-WEB_DMZ_DC1G2"               # Appliance
    - "IPL-WEB_DMZ_DC2"                 # Appliance
    - "IPL-WEB_DMZ_LTM_PD-900055"       # Appliance
    - "IPL-INTERNAL_LTM_PD-900055"       # Appliance

  excluded_labels:
    - "A-*"              # Application labels — always permitted
    - "E-*"              # Environment labels — always permitted
    - "R-METTLE-CI"      # Specific permitted role label
    - "METTLECI-*"       # METTLECI correlation labels

  excluded_label_groups:
    - "LG-E-NON_QUARANTINE"
    - "LG-E-NON_PRODUCTION_ENVIRONMENTS"

  # ----- EUC (flagged for REVIEW, not auto-excluded) -----
  euc_patterns:
    - "A-END_USER_COMPUTE_*"

output:
  # edr_export_path: "/path/to/shared/folder/illumio_ruleset.csv"
  edr_columns:
    - "Scopes"
    - "Sources"
    - "Destinations"
    - "Destination Services"
    - "Ruleset"
